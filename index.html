<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Editor | Elegant & Utilitarian</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- SF Pro Icons or Font Awesome fallback -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Marked for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="app-container" role="main">
      <!-- Left Column: Explorer (Progressive Disclosure) -->
      <aside class="explorer" aria-label="File Explorer">
        <header class="explorer-header">
          <h2>Explorer</h2>
          <button
            id="open-directory"
            title="Open Local Directory"
            aria-label="Open Directory"
          >
            <i class="fas fa-folder-open"></i>
          </button>
        </header>
        <nav id="file-list-container">
          <ul id="file-list" role="listbox" aria-label="Markdown Files">
            <!-- File list populated via script -->
          </ul>
        </nav>
      </aside>

      <!-- Center Column: Workspace (Utilitarian Workspace) -->
      <section class="workspace" aria-label="Editor Workspace">
        <header class="workspace-header">
          <div class="file-info" aria-live="polite">
            <span id="current-filename">Untitled.md</span>
            <span id="unsaved-indicator" hidden title="Unsaved Changes">*</span>
          </div>
          <div class="actions">
            <button
              id="new-file"
              title="New Document (⌘N)"
              aria-label="New File"
            >
              <i class="fas fa-plus"></i>
            </button>
            <button
              id="save-file"
              title="Save Document (⌘S)"
              aria-label="Save File"
            >
              <i class="fas fa-save"></i>
            </button>
            <button
              id="export-pdf"
              title="Export as PDF"
              aria-label="Export PDF"
            >
              <i class="fas fa-file-pdf"></i>
            </button>
          </div>
        </header>
        <textarea
          id="editor"
          placeholder="Start writing your thoughts in Markdown..."
          spellcheck="true"
          aria-label="Markdown Editor Content"
        ></textarea>
      </section>

      <!-- Right Column: Viewer (Rendered Preview) -->
      <aside class="viewer" aria-label="Markdown Preview">
        <header class="viewer-header">
          <h2>Preview</h2>
          <div class="viewer-settings">
            <select id="theme-select" aria-label="Choose Theme">
              <option value="light">Light</option>
              <option value="dark">Dark</option>
              <option value="sepia">Sepia</option>
            </select>
            <input
              type="number"
              id="font-size"
              value="16"
              min="12"
              max="24"
              title="Font Size"
              aria-label="Font Size"
            />
            <input
              type="color"
              id="bg-color"
              value="#ffffff"
              title="Background Color"
              aria-label="Background Color"
            />
          </div>
        </header>
        <div id="preview-content" class="markdown-body" aria-live="polite">
          <!-- Rendered markdown -->
        </div>
      </aside>
    </div>

    <!-- Educational Guidance Component -->
    <div id="guidance-container"></div>

    <script src="script.js"></script>
  </body>
</html>
